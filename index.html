<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>my space ♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:     #FFB7CE;
      --glow:       rgba(255, 45, 120, 0.15);
      --border:     rgba(255, 45, 120, 0.35);
      --bg:         #0a0a0a;
      --card:       #111111;
      --text:       #f0e6ee;
      --muted:      #a08898;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .banner {
      height: 130px;
      background: linear-gradient(135deg, rgba(255,45,120,0.22) 0%, rgba(255,45,120,0.06) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .banner.has-image {
      background: none;
    }


    .banner:not(.has-image)::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 20px,
        rgba(255,255,255,0.02) 20px, rgba(255,255,255,0.02) 21px
      );
    }

    .divider-row { position: relative; height: 0; margin: 0 2rem; }

    .divider-line {
      position: absolute;
      top: 0; left: 60px; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg, var(--accent) 0%, rgba(255,45,120,0.05) 100%);
    }

    .pfp-wrap {
      position: absolute;
      top: -44px; left: -8px;
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      overflow: hidden;
      box-shadow: 0 0 20px var(--glow);
      z-index: 2;
      background: #1a0010;
    }

    .pfp-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 3.5rem 2rem 1.5rem;
      align-items: start;
    }

    .left { display: flex; flex-direction: column; gap: 1.25rem; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .handle {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .bio {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
      font-style: italic;
    }

    .links { display: flex; flex-direction: column; gap: 0.6rem; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.82rem;
      transition: color 0.2s;
      letter-spacing: 0.03em;
    }

    .link-item:hover { color: var(--accent); }

    .link-icon {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .link-item:hover .link-icon {
      border-color: var(--accent);
      background: var(--glow);
    }

    .link-icon svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      display: block;
      fill: currentColor;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 180px;
    }

    .gif-wrap {
      width: 100%;
      max-width: 200px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
   
      border: 1.5px dashed var(--border);
      border-radius: 12px;
    }

    .gif-wrap.has-gif {
      border: none;
    }

    .gif-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: transparent;
      display: none; 
    }

    .gif-wrap img.loaded {
      display: block;
    }

    .gif-placeholder {
      font-size: 0.7rem;
      color: var(--border);
      text-align: center;
      line-height: 1.6;
      padding: 1rem;
    }

    .player {
      margin: 0 2rem 1.5rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--glow);
    }

    .song-name {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 0.65rem;
      font-style: italic;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
    }

    .ctrl-btn {
      background: none; border: none;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }

    .ctrl-btn svg { width: 16px; height: 16px; fill: var(--muted); display: block; }

    .play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }

    .play-btn:hover { background: var(--glow); transform: scale(1.05); }

    .play-btn svg { width: 14px; height: 14px; fill: var(--accent); display: block; }

    .progress-wrap {
      margin-top: 0.65rem;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s linear;
    }

    audio { display: none; }

    .footer {
      text-align: center;
      padding: 0 0 1.25rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0.3;
    }

.volume-control {
  display: flex;
  align-items: center;
  gap: 0.45rem;
}

.volume-icon {
  width: 14px;
  height: 14px;
  fill: var(--muted);
  opacity: 0.7;
}

#volume-slider {
  width: 75px;
  height: 3px;
  accent-color: var(--accent);
  cursor: pointer;
}

    @media (max-width: 500px) {
      .content { grid-template-columns: 1fr; }
      .right { display: none; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="banner"></div>

  <div class="divider-row">
    <div class="pfp-wrap">
      <img src="pfp.jpg" alt="pfp" onerror="this.style.opacity='0'"/>
    </div>
    <div class="divider-line"></div>
  </div>

  <div class="content">
    <div class="left">
      <div>
        <div class="name">your name ♡</div>
        <div class="handle">@yourhandle</div>
      </div>
      <div class="bio">just a girl who loves cats, games &amp; music ˚₊·➳❥</div>

      <div class="links">


        <a href="https://www.twitch.tv/roryyxii" class="link-item" target="_blank" rel="noopener">
         <span class="link-icon">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 2L2 6v14h5v4l4-4h3l8-8V2H4zm16 9l-4 4h-4l-3 3v-3H6V4h14v7z"/>
    <path d="M15 7h2v5h-2zM10 7h2v5h-2z"/>
  </svg>
</span>
          ttv
        </a>

        <a href="https://steamcommunity.com/id/rxdy/" class="link-item" target="_blank" rel="noopener">
          <span class="link-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.029 4.524 4.524s-2.03 4.523-4.524 4.523h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.253 0-2.265-1.014-2.265-2.265z"/></svg>
          </span>
          steam
        </a>

<div class="link-item">
    <span class="link-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.369A19.791 19.791 0 0 0 15.885 3c-.191.328-.403.775-.553 1.124a18.27 18.27 0 0 0-5.29 0A11.587 11.587 0 0 0 9.489 3a19.736 19.736 0 0 0-4.433 1.369C2.249 8.55 1.49 12.62 1.87 16.633a19.9 19.9 0 0 0 5.993 3.034c.483-.665.913-1.37 1.283-2.11-.705-.266-1.378-.592-2.018-.965.17-.124.336-.252.496-.385 3.89 1.82 8.11 1.82 11.954 0 .16.133.326.261.496.385-.64.373-1.314.699-2.02.965.37.74.8 1.445 1.284 2.11a19.89 19.89 0 0 0 5.992-3.034c.446-4.684-.762-8.718-3.013-12.264z"/>
        </svg>
    </span>
    disc: roryyxii
</div>
        

      </div>
    </div>

    <div class="right">
      <div class="gif-wrap" id="gif-wrap">

        <img src="cat.gif" alt="cat gif" id="cat-gif"
          onload="this.classList.add('loaded'); document.getElementById('gif-wrap').classList.add('has-gif'); document.getElementById('gif-placeholder').style.display='none';"
          onerror="this.style.display='none';"
        />
        <div class="gif-placeholder" id="gif-placeholder">
          add your<br/>cat gif here ♡<br/><span style="font-size:0.6rem;opacity:0.6">set gif: in CONFIG</span>
        </div>
      </div>
    </div>
  </div>

  <div class="player">
    <div class="song-name">♪ song name</div>
    <div class="controls">
      <button class="ctrl-btn" disabled aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M17 17h2v2l3-3-3-3v2h-2a4 4 0 0 1-3.2-1.6l-1.3-1.73A6 6 0 0 0 7.8 9H2v2h5.8a4 4 0 0 1 3.2 1.6l1.3 1.73A6 6 0 0 0 17 17zm-9.8-6A4 4 0 0 1 10.4 9.4L11.73 11A6 6 0 0 1 17 9h2V7l3 3-3 3V11h-2a4 4 0 0 0-3.2 1.6l-1.3 1.73A6 6 0 0 1 7.2 16H2v-2h5.2a4 4 0 0 0 3-1.4z"/></svg>
      </button>
      <button class="ctrl-btn" disabled aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" id="play-btn" aria-label="play or pause">
        <svg viewBox="0 0 24 24" id="play-svg"><path id="play-path" d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" disabled aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl-btn" disabled aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
      <div class="volume-control">
  <svg class="volume-icon" viewBox="0 0 24 24">
    <path d="M3 9v6h4l5 5V4L7 9H3z"/>
  </svg>

  <input
    type="range"
    id="volume-slider"
    min="0"
    max="1"
    step="0.01"
    value="0.25"
  />
</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

  </div>


  <audio id="audio" src="your-song.mp3"></audio>

  <div class="footer">made with ♡</div>
</div>

<script>
  const CONFIG = {
    name:       "velvet ♡",
    handle:     "@roryyxii",
    bio:        "just a girl who loves cats, games & music ❥ 23",

    pfp:        "pfp.jpg",
    banner:     "banner.png",
    gif:        "cat.gif",

    accentColor:"#FFB7CE",
    bgColor:    "#0a0a0a",
    cardColor:  "#111111",
    textColor:  "#f0e6ee",
    mutedColor: "#a08898",

    songFile:   "AngelRadio.mp3",
    songTitle:  "angel ʚ ♡ ɞ radio",
    songStartTime: 20,
    songVolume: 0.25,
  };

  function hexToRgb(hex) {
    const clean = hex.replace("#", "");
    return {
      r: parseInt(clean.slice(0, 2), 16),
      g: parseInt(clean.slice(2, 4), 16),
      b: parseInt(clean.slice(4, 6), 16)
    };
  }

  (function applyConfig() {
    const { r, g, b } = hexToRgb(CONFIG.accentColor);
    const root = document.documentElement;

    root.style.setProperty("--accent", CONFIG.accentColor);
    root.style.setProperty("--glow", `rgba(${r},${g},${b},0.15)`);
    root.style.setProperty("--border", `rgba(${r},${g},${b},0.35)`);
    root.style.setProperty("--bg", CONFIG.bgColor);
    root.style.setProperty("--card", CONFIG.cardColor);
    root.style.setProperty("--text", CONFIG.textColor);
    root.style.setProperty("--muted", CONFIG.mutedColor);

    document.querySelector(".name").textContent = CONFIG.name;
    document.querySelector(".handle").textContent = CONFIG.handle;
    document.querySelector(".bio").textContent = CONFIG.bio;
    document.querySelector(".pfp-wrap img").src = CONFIG.pfp;
    document.querySelector(".song-name").textContent = "♪ " + CONFIG.songTitle;
    document.querySelector("#audio").src = CONFIG.songFile;
    document.getElementById("audio").volume = CONFIG.songVolume;
    window.addEventListener("load", async () => {
  audio.currentTime = CONFIG.songStartTime;

  try {
    audio.volume = 0.01;

    await audio.play();

    playing = true;
    playPath.setAttribute('d', PAUSE);

    let target = CONFIG.songVolume;
    let step = 0.01;

    const fade = setInterval(() => {
      if (audio.volume < target) {
        audio.volume = Math.min(audio.volume + step, target);
      } else {
        clearInterval(fade);
      }
    }, 200);

  } catch (err) {
    console.log("Autoplay blocked");
  }
});

    const banner = document.querySelector(".banner");

    if (CONFIG.banner) {
      banner.style.backgroundImage =
        `linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.35)), url("${CONFIG.banner}")`;
      banner.style.backgroundSize = "cover";
      banner.style.backgroundPosition = "center";
      banner.classList.add("has-image");
    } else {
      banner.style.background =
        `linear-gradient(135deg, rgba(${r},${g},${b},0.22) 0%, rgba(${r},${g},${b},0.06) 100%)`;
      banner.classList.remove("has-image");
    }

    const gif = document.getElementById("cat-gif");
    gif.src = CONFIG.gif;
  })();
  

const audio        = document.getElementById('audio');
const playBtn      = document.getElementById('play-btn');
const playPath     = document.getElementById('play-path');
const progressFill = document.getElementById('progress-fill');
const volumeSlider = document.getElementById('volume-slider');

let playing = false;

const PLAY  = 'M8 5v14l11-7z';
const PAUSE = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

audio.volume = CONFIG.songVolume;
volumeSlider.value = CONFIG.songVolume;

volumeSlider.addEventListener('input', () => {
  audio.volume = volumeSlider.value;
});

playBtn.addEventListener('click', () => {
  if (playing) {
    audio.pause();
    playPath.setAttribute('d', PLAY);
    playing = false;
  } else {
    audio.currentTime = CONFIG.songStartTime;
    audio.play().catch(() => {});
    playPath.setAttribute('d', PAUSE);
    playing = true;
  }
});

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    progressFill.style.width =
      (audio.currentTime / audio.duration * 100) + '%';
  }
});

audio.addEventListener('ended', () => {
  playPath.setAttribute('d', PLAY);
  progressFill.style.width = '0%';
  playing = false;
});
</script>

</body>
</html>
